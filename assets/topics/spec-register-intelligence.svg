<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.title { font: 700 28px Inter, Segoe UI, sans-serif; fill: #E9EEFC; }
.sub { font: 500 16px Inter, Segoe UI, sans-serif; fill: #A9B6D3; }
.head { font: 700 18px Inter, Segoe UI, sans-serif; fill: #E9EEFC; }
.item { font: 500 15px Inter, Segoe UI, sans-serif; fill: #C9D4EE; }
.box { fill:#121A31; stroke:rgba(255,255,255,.09); stroke-width:1.2; }
.arr { stroke:rgba(120,166,255,.45); stroke-width:3; }
</style>
</defs>
<rect width="1200" height="420" rx="24" fill="#0B1020"/>
<text x="56" y="54" class="title">Spec / Register Intelligence</text>
<text x="56" y="82" class="sub">From documentation and CSR definitions to verification intent</text>
<rect x="56" y="120" width="300" height="220" rx="18" class="box"/>
<rect x="450" y="120" width="300" height="220" rx="18" class="box"/>
<rect x="844" y="120" width="300" height="220" rx="18" class="box"/>
<text x="84" y="158" class="head">Inputs</text>
<text x="84" y="192" class="item">• Specs / protocol docs</text><text x="84" y="218" class="item">• Register definitions</text><text x="84" y="244" class="item">• Testplan context</text>
<text x="478" y="158" class="head">Processing</text>
