<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.title { font: 700 28px Inter, Segoe UI, sans-serif; fill: #E9EEFC; }
.sub { font: 500 16px Inter, Segoe UI, sans-serif; fill: #A9B6D3; }
.head { font: 700 18px Inter, Segoe UI, sans-serif; fill: #E9EEFC; }
.item { font: 500 15px Inter, Segoe UI, sans-serif; fill: #C9D4EE; }
.box { fill:#121A31; stroke:rgba(255,255,255,.09); stroke-width:1.2; }
.arr { stroke:rgba(120,166,255,.45); stroke-width:3; }
</style>
</defs>
<rect width="1200" height="420" rx="24" fill="#0B1020"/>
<text x="56" y="54" class="title">Debug Intelligence</text>
<text x="56" y="82" class="sub">From traces and failures to better root-cause guidance</text>
<rect x="56" y="120" width="300" height="220" rx="18" class="box"/>
<rect x="450" y="120" width="300" height="220" rx="18" class="box"/>
<rect x="844" y="120" width="300" height="220" rx="18" class="box"/>
<text x="84" y="158" class="head">Inputs</text>
<text x="84" y="192" class="item">• Waveform / trace summary</text><text x="84" y="218" class="item">• Fail logs</text><text x="84" y="244" class="item">• Assertions / protocol events</text>
<text x="478" y="158" class="head">Processing</text>
<text x="478" y="192" class="item">• Extract key events</text><text x="478" y="218" class="item">• Detect divergence points</text><text x="478" y="244" class="item">• Correlate symptoms</text>
<text x="872" y="158" class="head">Outputs</text>
<text x="872" y="192" class="item">• Suspect block / signal</text><text x="872" y="218" class="item">• Debug path hints</text><text x="872" y="244" class="item">• Root-cause hypothesis</text>
<path d="M356 230 L450 230" class="arr"/>
<path d="M750 230 L844 230" class="arr"/>
</svg>